<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogo de Cliques PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #1e1e2f;
  color: white;
  text-align: center;
}

/* telas */
.screen {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.active {
  display: flex;
}

/* botão */
button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* HUD */
#hud {
  margin-top: 10px;
}

/* grid */
.game-area {
  display: grid;
  grid-template-columns: repeat(4, 80px);
  gap: 12px;
  justify-content: center;
  margin-top: 20px;
}

/* caixas */
.box {
  width: 80px;
  height: 80px;
  border-radius: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  animation: pop 0.2s ease;
}

.good { background: #4caf50; }
.bad { background: #f44336; }
.gold { background: gold; }
.bomb { background: black; }

@keyframes pop {
  from { transform: scale(0); }
  to { transform: scale(1); }
}
</style>

</head>

<body>

<!-- MENU -->

<div id="menu" class="screen active">
  <h1>🎯 Jogo de Cliques</h1>
  <button onclick="startGame()">▶️ Jogar</button>
</div>

<!-- JOGO -->

<div id="gameScreen" class="screen">
  <div id="hud">
    Pontos: <span id="score">0</span> |
    Tempo: <span id="time">30</span> |
    Vidas: <span id="lives">3</span>
  </div>

  <div class="game-area" id="game"></div>

<button onclick="toggleSound()" id="soundBtn">🔊 Som</button>

</div>

<!-- GAME OVER -->

<div id="gameOver" class="screen">
  <h1>💀 Game Over</h1>
  <p>Pontuação: <span id="finalScore"></span></p>
  <button onclick="goMenu()">Voltar</button>
</div>

<script>
const menu = document.getElementById("menu");
const gameScreen = document.getElementById("gameScreen");
const gameOverScreen = document.getElementById("gameOver");

const gameArea = document.getElementById("game");

const scoreDisplay = document.getElementById("score");
const timeDisplay = document.getElementById("time");
const livesDisplay = document.getElementById("lives");
const finalScore = document.getElementById("finalScore");

const soundBtn = document.getElementById("soundBtn");

let score, time, lives;
let gameInterval, boxInterval;
let soundOn = true;

let audioCtx = null;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playSound(freq) {
  if (!soundOn || !audioCtx) return;

  const osc = audioCtx.createOscillator();
  osc.frequency.value = freq;
  osc.connect(audioCtx.destination);
  osc.start();
  setTimeout(() => osc.stop(), 100);
}

function toggleSound() {
  soundOn = !soundOn;
  soundBtn.textContent = soundOn ? "🔊 Som" : "🔇 Mudo";
}

/* telas */
function show(screen) {
  menu.classList.remove("active");
  gameScreen.classList.remove("active");
  gameOverScreen.classList.remove("active");
  screen.classList.add("active");
}

/* jogo */
function createBox() {
  if (gameArea.children.length >= 8) return;

  const box = document.createElement("div");
  box.classList.add("box");

  const rand = Math.random();
  let type;

  if (rand > 0.8) {
    type = "gold";
    box.classList.add("gold");
    box.textContent = "⭐";
  } else if (rand > 0.65) {
    type = "bomb";
    box.classList.add("bomb");
    box.textContent = "💣";
  } else if (rand > 0.3) {
    type = "good";
    box.classList.add("good");
  } else {
    type = "bad";
    box.classList.add("bad");
  }

  box.onclick = () => {
    if (type === "good") { score++; playSound(600); }
    if (type === "bad") { score--; playSound(200); }
    if (type === "gold") { score += 3; playSound(900); }
    if (type === "bomb") {
      lives--;
      livesDisplay.textContent = lives;
      playSound(100);
    }

    scoreDisplay.textContent = score;

    box.style.transform = "scale(1.4)";
    box.style.opacity = "0";

    setTimeout(() => box.remove(), 100);

    if (lives <= 0) endGame();
  };

  gameArea.appendChild(box);

  setTimeout(() => {
    if (box.parentNode) box.remove();
  }, 1500);
}

function startGame() {
  initAudio(); // 🔥 garante som funcionando após clique

  score = 0;
  time = 30;
  lives = 3;

  scoreDisplay.textContent = score;
  timeDisplay.textContent = time;
  livesDisplay.textContent = lives;

  gameArea.innerHTML = "";

  show(gameScreen);

  clearInterval(gameInterval);
  clearInterval(boxInterval);

  gameInterval = setInterval(() => {
    time--;
    timeDisplay.textContent = time;
    if (time <= 0) endGame();
  }, 1000);

  boxInterval = setInterval(createBox, 700);
}

function endGame() {
  clearInterval(gameInterval);
  clearInterval(boxInterval);

  finalScore.textContent = score;
  show(gameOverScreen);
}

function goMenu() {
  show(menu);
}
</script>

</body>
</html>
