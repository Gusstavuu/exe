<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogo de Cliques</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #1e1e2f;
  color: white;
}

#info {
  margin: 10px;
  font-size: 18px;
}

.game-area {
  display: grid;
  grid-template-columns: repeat(4, 80px);
  gap: 15px;
  justify-content: center;
  margin-top: 20px;
}

.box {
  width: 80px;
  height: 80px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  animation: pop 0.2s ease;
}

.good { background: #4caf50; }
.bad { background: #f44336; }
.gold { background: gold; }
.bomb { background: black; }

@keyframes pop {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
}
</style>

</head>

<body>

<h1>🎯 Jogo de Cliques</h1>

<div id="info">
  Pontos: <span id="score">0</span> |
  Tempo: <span id="time">30</span>s |
  Vidas: <span id="lives">3</span> ❤️ |
  Recorde: <span id="highscore">0</span>
</div>

<div class="game-area" id="game"></div>

<button onclick="startGame()">Reiniciar</button>

<script>
const gameArea = document.getElementById("game");
const scoreDisplay = document.getElementById("score");
const timeDisplay = document.getElementById("time");
const livesDisplay = document.getElementById("lives");
const highscoreDisplay = document.getElementById("highscore");

let score = 0;
let time = 30;
let lives = 3;

let gameInterval;
let boxInterval;

const MAX_BOXES = 8;

function createBox() {
  if (gameArea.children.length >= MAX_BOXES) return;

  const box = document.createElement("div");
  box.classList.add("box");

  const rand = Math.random();
  let type;

  if (rand > 0.8) {
    type = "gold";
    box.classList.add("gold");
    box.textContent = "⭐";
  } else if (rand > 0.65) {
    type = "bomb";
    box.classList.add("bomb");
    box.textContent = "💣";
  } else if (rand > 0.3) {
    type = "good";
    box.classList.add("good");
  } else {
    type = "bad";
    box.classList.add("bad");
  }

  box.onclick = () => {
    if (type === "good") score++;
    if (type === "bad") score--;
    if (type === "gold") score += 3;
    if (type === "bomb") {
      lives--;
      livesDisplay.textContent = lives;
    }

    scoreDisplay.textContent = score;

    box.style.transform = "scale(1.4)";
    box.style.opacity = "0";

    setTimeout(() => box.remove(), 100);

    if (lives <= 0) endGame();
  };

  gameArea.appendChild(box);

  setTimeout(() => {
    if (box.parentNode) box.remove();
  }, 1500);
}

function updateHighscore() {
  let highscore = localStorage.getItem("highscore") || 0;
  if (score > highscore) {
    localStorage.setItem("highscore", score);
    highscore = score;
  }
  highscoreDisplay.textContent = highscore;
}

function endGame() {
  clearInterval(gameInterval);
  clearInterval(boxInterval);
  updateHighscore();
  alert("💀 Game Over! Pontos: " + score);
}

function startGame() {
  score = 0;
  time = 30;
  lives = 3;

  gameArea.innerHTML = "";

  scoreDisplay.textContent = score;
  timeDisplay.textContent = time;
  livesDisplay.textContent = lives;

  clearInterval(gameInterval);
  clearInterval(boxInterval);

  gameInterval = setInterval(() => {
    time--;
    timeDisplay.textContent = time;

    if (time <= 0) endGame();
  }, 1000);

  boxInterval = setInterval(createBox, 700);
}

startGame();
</script>

</body>
</html>
