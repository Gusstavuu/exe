<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jogo de Cliques</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #1e1e2f;
      color: white;
    }

    #score {
      font-size: 24px;
      margin: 10px;
    }

    .game-area {
      display: grid;
      grid-template-columns: repeat(4, 80px);
      gap: 15px;
      justify-content: center;
      margin-top: 20px;
    }

    .box {
      width: 80px;
      height: 80px;
      background: gray;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
    }

    .box:hover {
      transform: scale(1.1);
    }

    .good { background: #4caf50; }
    .bad { background: #f44336; }
  </style>
</head>
<body>

<h1>🎯 Jogo de Cliques</h1>
<div id="score">Pontos: 0</div>
<div class="game-area" id="game"></div>

<script>
const gameArea = document.getElementById("game");
const scoreDisplay = document.getElementById("score");

let score = 0;
const MAX_BOXES = 8;

function createBox() {
  if (gameArea.children.length >= MAX_BOXES) return;

  const box = document.createElement("div");
  box.classList.add("box");

  const isGood = Math.random() > 0.3;
  box.classList.add(isGood ? "good" : "bad");

  box.addEventListener("click", () => {
    score += isGood ? 1 : -1;
    scoreDisplay.textContent = "Pontos: " + score;
    box.remove();
  });

  gameArea.appendChild(box);

  // caixa desaparece sozinha depois de um tempo
  setTimeout(() => {
    if (box.parentNode) box.remove();
  }, 1500);
}

// gera caixas continuamente
setInterval(createBox, 800);
</script>

</body>
</html>
