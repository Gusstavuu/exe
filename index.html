<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogo de Cliques PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #1e1e2f;
  color: white;
  text-align: center;
}

/* telas */
.screen {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.active {
  display: flex;
}

/* botão */
button {
  padding: 12px 25px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* grid */
.game-area {
  display: grid;
  grid-template-columns: repeat(4, 80px);
  gap: 12px;
  justify-content: center;
  margin-top: 20px;
}

/* caixas */
.box {
  width: 80px;
  height: 80px;
  border-radius: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  animation: pop 0.2s ease;
}

.good { background: #4caf50; }
.bad { background: #f44336; }
.gold { background: gold; }
.bomb { background: black; }

@keyframes pop {
  from { transform: scale(0); }
  to { transform: scale(1); }
}
</style>

</head>

<body>

<!-- MENU -->

  <div id="hud">
  ⭐ Pontos: <span id="score">0</span> |
  ⏱️ Tempo: <span id="time">30</span> |
  ❤️ Vidas: <span id="lives">3</span> |
  🔥 Combo: <span id="combo">0</span>
</div>

<div id="menu" class="screen active">
  <h1>🎯 Jogo de Cliques</h1>
  <button onclick="startGame()">▶️ Jogar</button>
</div>

<!-- JOGO -->

<div id="gameScreen" class="screen">
  <div id="hud">
  ⭐ Pontos: <span id="score">0</span> |
  ⏱️ Tempo: <span id="time">30</span> |
  ❤️ Vidas: <span id="lives">3</span> |
  🔥 Combo: <span id="combo">0</span>
  </div>

  <div class="game-area" id="game"></div>

<button onclick="toggleSound()" id="soundBtn">🔊 Som</button>

</div>

<!-- GAME OVER -->

<div id="gameOver" class="screen">
  <h1>💀 Game Over</h1>
  <p>Pontuação: <span id="finalScore"></span></p>
  <button onclick="goMenu()">Voltar</button>
</div>

  <script>
const menu = document.getElementById("menu");
const gameScreen = document.getElementById("gameScreen");
const gameOver = document.getElementById("gameOver");

const gameArea = document.getElementById("game");

const scoreDisplay = document.getElementById("score");
const timeDisplay = document.getElementById("time");
const livesDisplay = document.getElementById("lives");
const comboDisplay = document.getElementById("combo");

let score = 0;
let time = 30;
let lives = 3;

let combo = 0;

let gameInterval;
let boxInterval;

function getMultiplier() {
  if (combo >= 7) return 3;
  if (combo >= 3) return 2;
  return 1;
}

function updateHUD() {
  scoreDisplay.textContent = score;
  comboDisplay.textContent = combo;
  livesDisplay.textContent = lives;
  timeDisplay.textContent = time;
}

function playEffect(x, y, text, color) {
  const el = document.createElement("div");
  el.textContent = text;
  el.style.position = "absolute";
  el.style.left = x + "px";
  el.style.top = y + "px";
  el.style.color = color;
  el.style.fontSize = "20px";
  el.style.fontWeight = "bold";
  el.style.pointerEvents = "none";
  el.style.transition = "all 0.5s ease";

  document.body.appendChild(el);

  setTimeout(() => {
    el.style.transform = "translateY(-30px)";
    el.style.opacity = "0";
  }, 10);

  setTimeout(() => el.remove(), 500);
}

function createBox() {
  if (gameArea.children.length >= 8) return;

  const box = document.createElement("div");
  box.classList.add("box");

  const rand = Math.random();
  let type;

  if (rand > 0.8) {
    type = "gold";
    box.classList.add("gold");
    box.textContent = "⭐";
  } else if (rand > 0.65) {
    type = "bomb";
    box.classList.add("bomb");
    box.textContent = "💣";
  } else if (rand > 0.3) {
    type = "good";
    box.classList.add("good");
  } else {
    type = "bad";
    box.classList.add("bad");
  }

  box.onclick = (e) => {
    const mult = getMultiplier();

    if (type === "good") {
      score += 1 * mult;
      combo++;
      playEffect(e.clientX, e.clientY, "+" + (1 * mult), "#4caf50");
    }

    if (type === "bad") {
      score -= 1;
      combo = 0;
      playEffect(e.clientX, e.clientY, "-1", "#f44336");
    }

    if (type === "gold") {
      score += 3 * mult;
      combo++;
      playEffect(e.clientX, e.clientY, "+" + (3 * mult), "gold");
    }

    if (type === "bomb") {
      lives--;
      combo = 0;
      playEffect(e.clientX, e.clientY, "💥", "black");
    }

    updateHUD();

    box.style.transform = "scale(1.4)";
    box.style.opacity = "0";

    setTimeout(() => box.remove(), 100);

    if (lives <= 0) endGame();
  };

  gameArea.appendChild(box);

  setTimeout(() => {
    if (box.parentNode) box.remove();
  }, 1500);
}

function startGame() {
  score = 0;
  time = 30;
  lives = 3;
  combo = 0;

  gameArea.innerHTML = "";
  updateHUD();

  menu.classList.remove("active");
  gameOver.classList.remove("active");
  gameScreen.classList.add("active");

  clearInterval(gameInterval);
  clearInterval(boxInterval);

  gameInterval = setInterval(() => {
    time--;
    updateHUD();

    if (time <= 0) endGame();
  }, 1000);

  boxInterval = setInterval(createBox, 650);
}

function endGame() {
  clearInterval(gameInterval);
  clearInterval(boxInterval);

  finalScore.textContent = score;

  gameScreen.classList.remove("active");
  gameOver.classList.add("active");
}

    function goMenu() {
  gameOver.classList.remove("active");
  menu.classList.add("active");
}

</script>
</body>
</html>
