<script>
const gameArea = document.getElementById("game");
const scoreDisplay = document.getElementById("score");
const timeDisplay = document.getElementById("time");
const livesDisplay = document.getElementById("lives");
const highscoreDisplay = document.getElementById("highscore");

let score = 0;
let time = 30;
let level = 1;
let lives = 3;

let gameInterval;
let boxInterval;

let spawnSpeed = 700;
let boxLifetime = 1500;

const MAX_BOXES = 8;

function playSound(freq) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.frequency.value = freq;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(() => osc.stop(), 100);
}

function updateLevel() {
  const newLevel = Math.floor(score / 5) + 1;

  if (newLevel !== level) {
    level = newLevel;

    spawnSpeed = Math.max(250, spawnSpeed - 50);
    boxLifetime = Math.max(500, boxLifetime - 100);

    clearInterval(boxInterval);
    boxInterval = setInterval(createBox, spawnSpeed);

    document.title = "Nível " + level + " 🔥";
  }
}

function createBox() {
  if (gameArea.children.length >= MAX_BOXES) return;

  const box = document.createElement("div");
  box.classList.add("box");

  const rand = Math.random();

  let type;

  if (rand > 0.8) {
    type = "gold";
    box.classList.add("gold");
    box.textContent = "⭐";
  } else if (rand > 0.65) {
    type = "bomb";
    box.classList.add("bomb");
    box.textContent = "💣";
  } else if (rand > 0.3) {
    type = "good";
    box.classList.add("good");
  } else {
    type = "bad";
    box.classList.add("bad");
  }

  box.onclick = () => {
    if (type === "good") {
      score += 1;
      playSound(600);
    } else if (type === "bad") {
      score -= 1;
      playSound(200);
    } else if (type === "gold") {
      score += 3;
      playSound(900);
    } else if (type === "bomb") {
      lives--;
      livesDisplay.textContent = lives;
      playSound(100);
    }

    // efeito visual
    box.style.transform = "scale(1.4)";
    box.style.opacity = "0";

    scoreDisplay.textContent = score;

    updateLevel();

    setTimeout(() => box.remove(), 100);

    checkGameOver();
  };

  gameArea.appendChild(box);

  setTimeout(() => {
    if (box.parentNode) box.remove();
  }, boxLifetime);
}

function checkGameOver() {
  if (lives <= 0) {
    endGame();
  }
}

function updateHighscore() {
  let highscore = localStorage.getItem("highscore") || 0;
  if (score > highscore) {
    localStorage.setItem("highscore", score);
    highscore = score;
  }
  highscoreDisplay.textContent = highscore;
}

function endGame() {
  clearInterval(gameInterval);
  clearInterval(boxInterval);
  updateHighscore();
  alert("💀 Game Over! Pontos: " + score);
}

function startGame() {
  score = 0;
  time = 30;
  level = 1;
  lives = 3;

  spawnSpeed = 700;
  boxLifetime = 1500;

  gameArea.innerHTML = "";

  scoreDisplay.textContent = score;
  timeDisplay.textContent = time;
  livesDisplay.textContent = lives;

  clearInterval(gameInterval);
  clearInterval(boxInterval);

  updateHighscore();

  gameInterval = setInterval(() => {
    time--;
    timeDisplay.textContent = time;

    if (time <= 0) {
      endGame();
    }
  }, 1000);

  boxInterval = setInterval(createBox, spawnSpeed);
}

startGame();
</script>
